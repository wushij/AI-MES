server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: ai-mes-backend
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:AI-MES}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      timeout: 5s
  jackson:
    default-property-inclusion: non_null
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  # 数据库由项目根目录 sql/ 手动维护（init.sql / migrations），启动时不自动执行 SQL
  sql:
    init:
      mode: never

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    # log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: true
  is-read-header: true
  is-read-cookie: false
  is-read-body: false
  is-log: true

knife4j:
  enable: true
  setting:
    language: zh_cn

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

aimes:
  upload-dir: ${UPLOAD_DIR:uploads}
  plan-split-qty: ${PLAN_SPLIT_QTY:100}
  bom-pick-on-complete: ${BOM_PICK_ON_COMPLETE:true}

coze:
  api-token: ${COZE_API_TOKEN:}
  bot-id: ${COZE_BOT_ID:}
  api-url: ${COZE_API_URL:https://api.coze.cn/v3}
  workflow-id: ${COZE_WORKFLOW_ID:}
  chat-poll-timeout-seconds: ${COZE_CHAT_POLL_TIMEOUT_SECONDS:90}
